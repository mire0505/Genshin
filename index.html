<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원신 캐릭터 위키</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   CSS VARIABLES & RESET
═══════════════════════════════════════ */
:root {
  --bg: #f7f6f2;
  --bg2: #edecea;
  --surface: #ffffff;
  --border: #e0ddd6;
  --border2: #ccc9c0;
  --text: #1c1a17;
  --text2: #5c5a54;
  --text3: #9c9a94;
  --accent: #c49a3c;
  --accent-light: #fdf4e0;
  --accent-border: #e8d090;
  --blue: #3a6ea8;
  --green: #3a7a4a;
  --red: #a03030;

  /* Element colors */
  --cryo: #7eb8d4;    --cryo-bg: #eaf4f9;
  --pyro: #e07040;    --pyro-bg: #fdf0e8;
  --hydro: #5090d0;   --hydro-bg: #eaf0fb;
  --electro: #b060d0; --electro-bg: #f5eafb;
  --anemo: #50b090;   --anemo-bg: #eaf7f2;
  --geo: #c8a030;     --geo-bg: #fdf6e0;
  --dendro: #70b040;  --dendro-bg: #f0f8e8;

  --r: 12px; --rs: 7px;
  --sh: 0 1px 3px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.06);
  --sh-hover: 0 4px 12px rgba(0,0,0,.10), 0 8px 24px rgba(0,0,0,.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ═══════════════════════════════════════
   PAGES (hash routing)
═══════════════════════════════════════ */
.page { display: none; }
.page.active { display: block; }

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  height: 54px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.logo {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-sub {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
}

/* Search bar */
.search-wrap {
  flex: 1;
  max-width: 400px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 7px 16px 7px 36px;
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: all .15s;
}
.search-wrap input:focus {
  border-color: var(--accent-border);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(196,154,60,.10);
}
.search-wrap input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 13px;
  pointer-events: none;
}

/* Nav tabs */
.nav-tabs {
  display: flex;
  gap: 2px;
  margin-left: auto;
}
.nav-tab {
  background: none; border: none;
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px; font-weight: 500;
  padding: 6px 12px;
  border-radius: var(--rs);
  transition: all .15s;
}
.nav-tab:hover { background: var(--bg2); color: var(--text); }
.nav-tab.active {
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 700;
}

/* ═══════════════════════════════════════
   LIST PAGE — main grid
═══════════════════════════════════════ */
.list-page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}
.filter-label {
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-right: 2px;
}
.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  font-size: 12.5px;
  padding: 5px 13px;
  transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active {
  background: var(--accent-light);
  border-color: var(--accent-border);
  color: var(--accent);
  font-weight: 600;
}
.filter-elem-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Character grid */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 14px;
}

/* Character card */
.char-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  overflow: hidden;
  transition: transform .18s ease, box-shadow .18s ease;
  box-shadow: var(--sh);
}
.char-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--sh-hover);
}
.char-card-img-wrap {
  position: relative;
  padding-top: 100%; /* square */
  overflow: hidden;
}
.char-card-img-wrap img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: top center;
  transition: transform .3s ease;
}
.char-card:hover .char-card-img-wrap img { transform: scale(1.04); }

.char-card-img-placeholder {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.4rem;
}
.char-card-star {
  position: absolute;
  top: 6px; left: 6px;
  background: rgba(0,0,0,.55);
  border-radius: 4px;
  color: #ffd060;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  letter-spacing: .03em;
}
.char-card-elem {
  position: absolute;
  top: 6px; right: 6px;
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  backdrop-filter: blur(4px);
}
.char-card-body {
  padding: 10px 10px 12px;
}
.char-card-name {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}
.char-card-meta {
  font-size: 11px;
  color: var(--text3);
  display: flex; align-items: center; gap: 4px;
}

/* No results */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: 14px;
}

/* ═══════════════════════════════════════
   DETAIL PAGE
═══════════════════════════════════════ */
.detail-page {
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* Breadcrumb */
.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: 12.5px; color: var(--text3);
  margin-bottom: 20px;
}
.breadcrumb-link {
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
}
.breadcrumb-link:hover { text-decoration: underline; }

/* Char hero */
.char-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--sh);
  overflow: hidden;
  margin-bottom: 20px;
  display: flex;
  gap: 0;
}
.char-hero-img-col {
  width: 180px;
  min-width: 180px;
  position: relative;
  overflow: hidden;
}
.char-hero-img-col img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}
.char-hero-img-placeholder {
  width: 100%; height: 100%;
  min-height: 220px;
  display: flex; align-items: center; justify-content: center;
  font-size: 5rem;
}
.char-hero-info {
  flex: 1;
  padding: 22px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.char-hero-name {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.02em;
}
.char-badges {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.badge {
  border-radius: 5px;
  font-size: 11.5px; font-weight: 600;
  padding: 3px 10px;
}
.b-star { background: #fef8e6; color: #b8860b; border: 1px solid #e8d580; }
.b-elem { border: 1px solid; }
.b-weap { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); }
.b-role { background: #eef6f0; color: var(--green); border: 1px solid #b8dfc0; }
.b-region { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); }

.char-hero-desc {
  font-size: 13.5px;
  color: var(--text2);
  line-height: 1.75;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

/* Detail tabs */
.detail-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  overflow-x: auto;
}
.detail-tabs::-webkit-scrollbar { display: none; }
.detail-tab {
  background: none; border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  font-size: 13.5px; font-weight: 500;
  padding: 10px 18px;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.detail-tab:hover { color: var(--text); }
.detail-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 700;
}

/* Section */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--sh);
  margin-bottom: 16px;
  overflow: hidden;
}
.section-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 700;
  color: var(--text);
  background: var(--bg2);
  display: flex; align-items: center; gap: 8px;
}
.section-icon { font-size: 15px; }
.section-body { padding: 16px 18px; }

/* Tables */
.wtable {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.wtable th {
  background: var(--bg2);
  color: var(--text3);
  font-size: 11px; font-weight: 600;
  letter-spacing: .05em; text-transform: uppercase;
  padding: 8px 12px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.wtable td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.wtable tr:last-child td { border-bottom: none; }
.wtable tr:nth-child(even) td { background: #fafaf8; }
.wtable td.c-name { color: var(--blue); font-weight: 500; }
.wtable td.c-source { color: var(--text2); font-size: 12.5px; }
.wtable td.c-note { color: var(--text2); font-size: 12.5px; }
.wtable td.c-rank { color: var(--accent); font-weight: 700; }

/* Image grids for materials */
.mat-grid {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 14px;
}
.mat-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 5px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 10px 8px;
  min-width: 70px; max-width: 88px;
  transition: border-color .15s;
}
.mat-item:hover { border-color: var(--border2); }
.mat-item img {
  width: 48px; height: 48px;
  object-fit: contain;
  border-radius: 6px;
}
.mat-item-fallback {
  width: 48px; height: 48px;
  border-radius: 6px;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.mat-item-name {
  font-size: 10.5px;
  color: var(--text2);
  text-align: center;
  line-height: 1.3;
  word-break: keep-all;
}

/* Priority pills */
.priority-list { display: flex; gap: 8px; flex-wrap: wrap; }
.priority-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent-light);
  border: 1px solid var(--accent-border);
  border-radius: 20px;
  padding: 5px 12px 5px 6px;
}
.priority-num {
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  width: 20px; height: 20px;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.priority-text { font-size: 12.5px; font-weight: 500; color: var(--accent); }

/* Stat rows */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
@media(max-width:500px) { .stat-grid { grid-template-columns: 1fr; } }
.stat-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--bg2);
  border-radius: var(--rs);
  padding: 8px 12px;
}
.stat-key { color: var(--text3); font-size: 11.5px; font-weight: 600; width: 50px; flex-shrink: 0; padding-top: 1px; }
.stat-val { color: var(--text); font-size: 12.5px; line-height: 1.5; }

/* Party cards */
.party-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
@media(max-width:600px){ .party-grid { grid-template-columns: 1fr; } }
.party-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 12px 14px;
}
.party-card-name { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px; }
.party-chars { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 7px; }
.party-char {
  font-size: 12px; font-weight: 500;
  color: var(--blue);
  background: #eef3fa;
  border: 1px solid #c0d8f0;
  border-radius: 4px;
  padding: 2px 8px;
}
.party-note { font-size: 12px; color: var(--text2); line-height: 1.5; }

/* Efficiency box */
.eff-box {
  background: #eef6f0;
  border: 1px solid #b8dfc0;
  border-radius: var(--rs);
  padding: 14px 16px;
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.75;
}

/* Mobile */
@media(max-width:600px){
  .char-hero { flex-direction: column; }
  .char-hero-img-col { width: 100%; min-width: unset; height: 200px; }
  .char-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
  .nav-tabs { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <a class="logo" onclick="goHome()">
      ⚔️ 원신 위키
      <span class="logo-sub">캐릭터 도감</span>
    </a>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="캐릭터 검색..." oninput="onSearch(this.value)">
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="goHome()">캐릭터</button>
    </div>
  </div>
</header>

<!-- ── LIST PAGE ── -->
<div id="listPage" class="page active">
  <div class="list-page">

    <!-- Filter bar -->
    <div class="filter-bar" id="filterBar">
      <span class="filter-label">원소</span>
      <button class="filter-btn active" data-filter-elem="all" onclick="setElemFilter('all')">전체</button>
      <button class="filter-btn" data-filter-elem="pyro" onclick="setElemFilter('pyro')"><span class="filter-elem-dot" style="background:var(--pyro)"></span>불꽃</button>
      <button class="filter-btn" data-filter-elem="hydro" onclick="setElemFilter('hydro')"><span class="filter-elem-dot" style="background:var(--hydro)"></span>물</button>
      <button class="filter-btn" data-filter-elem="cryo" onclick="setElemFilter('cryo')"><span class="filter-elem-dot" style="background:var(--cryo)"></span>얼음</button>
      <button class="filter-btn" data-filter-elem="electro" onclick="setElemFilter('electro')"><span class="filter-elem-dot" style="background:var(--electro)"></span>번개</button>
      <button class="filter-btn" data-filter-elem="anemo" onclick="setElemFilter('anemo')"><span class="filter-elem-dot" style="background:var(--anemo)"></span>바람</button>
      <button class="filter-btn" data-filter-elem="geo" onclick="setElemFilter('geo')"><span class="filter-elem-dot" style="background:var(--geo)"></span>바위</button>
      <button class="filter-btn" data-filter-elem="dendro" onclick="setElemFilter('dendro')"><span class="filter-elem-dot" style="background:var(--dendro)"></span>풀</button>
    </div>

    <div class="char-grid" id="charGrid"></div>
    <div class="no-results" id="noResults" style="display:none">검색 결과가 없어요</div>
  </div>
</div>

<!-- ── DETAIL PAGE ── -->
<div id="detailPage" class="page">
  <div class="detail-page">

    <div class="breadcrumb">
      <a class="breadcrumb-link" onclick="goHome()">캐릭터</a>
      <span>›</span>
      <span id="breadcrumbName">—</span>
    </div>

    <!-- Hero -->
    <div class="char-hero" id="charHero"></div>

    <!-- Tabs -->
    <div class="detail-tabs" id="detailTabs">
      <button class="detail-tab active" data-tab="ascension" onclick="switchTab('ascension')">돌파 재료</button>
      <button class="detail-tab" data-tab="talent" onclick="switchTab('talent')">특성 재료</button>
      <button class="detail-tab" data-tab="build" onclick="switchTab('build')">세팅 가이드</button>
      <button class="detail-tab" data-tab="party" onclick="switchTab('party')">파티 구성</button>
      <button class="detail-tab" data-tab="efficiency" onclick="switchTab('efficiency')">효율 분석</button>
    </div>

    <div id="detailContent"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  ELEMENT CONFIG
// ════════════════════════════════════════════════════
const ELEM = {
  cryo:    { label:'얼음', color:'#7eb8d4', bg:'#eaf4f9', icon:'❄' },
  pyro:    { label:'불꽃', color:'#e07040', bg:'#fdf0e8', icon:'🔥' },
  hydro:   { label:'물',   color:'#5090d0', bg:'#eaf0fb', icon:'💧' },
  electro: { label:'번개', color:'#b060d0', bg:'#f5eafb', icon:'⚡' },
  anemo:   { label:'바람', color:'#50b090', bg:'#eaf7f2', icon:'🌀' },
  geo:     { label:'바위', color:'#c8a030', bg:'#fdf6e0', icon:'⛰' },
  dendro:  { label:'풀',   color:'#70b040', bg:'#f0f8e8', icon:'🌿' },
};

// ════════════════════════════════════════════════════
//  IMAGE URL MAPPINGS (원신 위키 CDN 직접 사용)
// ════════════════════════════════════════════════════
const WIKI_BASE = 'https://genshin-impact.fandom.com/wiki/Special:FilePath/';
const w = name => WIKI_BASE + encodeURIComponent(name) + '.png';

// 캐릭터 카드 이미지
const CHAR_IMG = {
  '에스코피에':   w('Escoffier_Card'),
  '종려':         w('Zhongli_Card'),
  '후':           w('Hu_Tao_Card'),
  '푸리나':       w('Furina_Card'),
  '라이덴 쇼군':  w('Raiden_Shogun_Card'),
  '카즈하':       w('Kaedehara_Kazuha_Card'),
  '나히다':       w('Nahida_Card'),
  '감유':         w('Ganyu_Card'),
  '나비아':       w('Navia_Card'),
  '느비예트':     w('Neuvillette_Card'),
  '아를레키노':   w('Arlecchino_Card'),
  '씨아오':       w('Xiao_Card'),
  '야에 미코':    w('Yae_Miko_Card'),
  '알하이탐':     w('Alhaitham_Card'),
  '라우마':       w('Lauma_Card'),
  '플린스':       w('Flins_Card'),
  '네페르':       w('Nefer_Card'),
  '두린':         w('Durin_Card'),
  '콜롬비나':     w('Columbina_Card'),
  '베넷':         w('Bennett_Card'),
  '행추':         w('Xingqiu_Card'),
};

// 재료 이미지
const MAT_IMG = {
  // 보석 (얼음)
  '서늘한 빙옥 가루':      w('Shivada_Jade_Sliver'),

    stats: { sand:'에너지 충전 효율', cup:'물 원소 피해 보너스', crown:'치명타율 / 치명타 피해', sub:'에너지 충전 효율 ≥ 치명타율 ≥ 치명타 피해' },
    talentPriority: ['원소 폭발','원소 스킬','일반 공격'],
    parties: [
      { name:'증발 팀', chars:['행추','후','베넷','카즈하'], note:'물 지속 + 증발 최강' },
      { name:'냉동 팀', chars:['행추','감유','카즈하','베넷'], note:'냉동 + 소용돌이' },
    ],
    efficiency:'4성 중 최상위. 물 원소 지속 부착 독보적. 모든 팀에서 필수급.',
  },
];

// ════════════════════════════════════════════════════
//  APP STATE
// ════════════════════════════════════════════════════
let curElem = 'all';
let curSearch = '';
let curChar = null;
let curTab = 'ascension';

// ════════════════════════════════════════════════════
//  ROUTING (hash-based)
// ════════════════════════════════════════════════════
function goHome() {
  history.pushState(null, '', '#/');
  showListPage();
}

function goChar(id) {
  const char = CHARS.find(c => c.id === id);
  if (!char) return;
  curChar = char;
  curTab = 'ascension';
  history.pushState(null, '', `#/char/${encodeURIComponent(id)}`);
  showDetailPage(char);
}

window.addEventListener('popstate', handleRoute);
window.addEventListener('load', handleRoute);

function handleRoute() {
  const hash = location.hash;
  if (hash.startsWith('#/char/')) {
    const id = decodeURIComponent(hash.replace('#/char/', ''));
    const char = CHARS.find(c => c.id === id);
    if (char) { curChar = char; showDetailPage(char); return; }
  }
  showListPage();
}

// ════════════════════════════════════════════════════
//  LIST PAGE
// ════════════════════════════════════════════════════
function showListPage() {
  document.getElementById('listPage').classList.add('active');
  document.getElementById('detailPage').classList.remove('active');
  renderGrid();
}

function setElemFilter(elem) {
  curElem = elem;
  document.querySelectorAll('[data-filter-elem]').forEach(b => {
    b.classList.toggle('active', b.dataset.filterElem === elem);
  });
  renderGrid();
}

function onSearch(val) {
  curSearch = val.toLowerCase();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('charGrid');
  const noRes = document.getElementById('noResults');

  const filtered = CHARS.filter(c => {
    const elemOk = curElem === 'all' || c.elem === curElem;
    const searchOk = !curSearch || c.id.toLowerCase().includes(curSearch);
    return elemOk && searchOk;
  });

  if (!filtered.length) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  grid.innerHTML = filtered.map(c => {
    const el = ELEM[c.elem];
    return `<div class="char-card" onclick="goChar('${c.id}')">
      <div class="char-card-img-wrap" style="background:${el.bg}">
        <img src="${IMG.char(c.id)}" alt="${c.id}"
          onerror="this.parentElement.innerHTML='<div class=\\'char-card-img-placeholder\\'style=\\'background:${el.bg}\\'>${el.icon}</div>'">
        <span class="char-card-star">★${c.star}</span>
        <span class="char-card-elem" style="background:${el.color}22">${el.icon}</span>
      </div>
      <div class="char-card-body">
        <div class="char-card-name">${c.id}</div>
        <div class="char-card-meta">
          <span style="width:7px;height:7px;border-radius:50%;background:${el.color};display:inline-block"></span>
          ${el.label} · ${c.weapon}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════
//  DETAIL PAGE
// ════════════════════════════════════════════════════
function showDetailPage(char) {
  document.getElementById('listPage').classList.remove('active');
  document.getElementById('detailPage').classList.add('active');
  document.getElementById('breadcrumbName').textContent = char.id;

  const el = ELEM[char.elem];

  // Hero
  document.getElementById('charHero').innerHTML = `
    <div class="char-hero-img-col" style="background:${el.bg}">
      <img src="${IMG.char(char.id)}" alt="${char.id}"
        onerror="this.parentElement.innerHTML='<div class=\\'char-hero-img-placeholder\\'>${el.icon}</div>'">
    </div>
    <div class="char-hero-info">
      <div class="char-hero-name">${char.id}</div>
      <div class="char-badges">
        <span class="badge b-star">★${char.star}성</span>
        <span class="badge b-elem" style="background:${el.bg};color:${el.color};border-color:${el.color}44">${el.icon} ${el.label}</span>
        <span class="badge b-weap">${char.weapon}</span>
        <span class="badge b-role">${char.role}</span>
        <span class="badge b-region">${char.region}</span>
      </div>
      <div class="char-hero-desc">${char.desc}</div>
    </div>`;

  // Reset tabs
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'ascension'));
  curTab = 'ascension';

  renderTab(char);
  window.scrollTo(0, 0);
}

function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderTab(curChar);
}

function renderTab(char) {
  const container = document.getElementById('detailContent');
  switch(curTab) {
    case 'ascension':  container.innerHTML = renderAscension(char); break;
    case 'talent':     container.innerHTML = renderTalent(char); break;
    case 'build':      container.innerHTML = renderBuild(char); break;
    case 'party':      container.innerHTML = renderParty(char); break;
    case 'efficiency': container.innerHTML = renderEfficiency(char); break;
  }
}

// ── Ascension ──
function renderAscension(c) {
  const a = c.ascension;
  const matItems = (names, label) => `
    <div style="font-size:11.5px;color:var(--text3);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">${label}</div>
    <div class="mat-grid" style="margin-top:0;margin-bottom:14px">
      ${names.map(n => matCard(n)).join('')}
    </div>`;

  return `
    <div class="section">
      <div class="section-header"><span class="section-icon">💎</span> 캐릭터 돌파 재료</div>
      <div class="section-body">
        <table class="wtable">
          <tr><th>종류</th><th>재료명</th><th>수급처</th></tr>
          <tr><td class="c-name">보석</td><td>${a.gem.join(' → ')}</td><td class="c-source">${a.gemSource}</td></tr>
          <tr><td class="c-name">보스 드롭</td><td>${a.boss}</td><td class="c-source">${a.bossSource}</td></tr>
          <tr><td class="c-name">지역 특산물</td><td>${a.local}</td><td class="c-source">${a.localSource}</td></tr>
          <tr><td class="c-name">일반 드롭</td><td>${a.mob.join(', ')}</td><td class="c-source">${a.mobSource}</td></tr>
          <tr><td class="c-name">모라</td><td colspan="2">${a.mora.toLocaleString()}</td></tr>
          <tr><td class="c-name">영웅의 경험</td><td colspan="2">${a.xp}개 (Lv1→90 기준)</td></tr>
        </table>
        <div style="margin-top:18px">
          ${matItems(a.gem, '보석 재료')}
          ${matItems([a.boss, a.local, ...a.mob], '보스 / 특산물 / 일반 드롭')}
        </div>
      </div>
    </div>`;
}

// ── Talent ──
function renderTalent(c) {
  const t = c.talent;
  return `
    <div class="section">
      <div class="section-header"><span class="section-icon">📖</span> 특성 재료</div>
      <div class="section-body">
        <table class="wtable">
          <tr><th>종류</th><th>재료명</th><th>수급처</th></tr>
          <tr><td class="c-name">특성 책</td><td>${t.book.join(' → ')}</td><td class="c-source">${t.bookDays} (비경)</td></tr>
          <tr><td class="c-name">주간 보스</td><td>${t.weekly}</td><td class="c-source">${t.weeklySource}</td></tr>
          <tr><td class="c-name">지식의 왕관</td><td>지식의 왕관 × ${t.crown}</td><td class="c-source">기간 한정 이벤트</td></tr>
        </table>
        <div style="margin-top:18px">
          <div style="font-size:11.5px;color:var(--text3);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">특성 책</div>
          <div class="mat-grid" style="margin-top:0">
            ${t.book.map(n => matCard(n)).join('')}
            ${matCard(t.weekly)}
            ${matCard('지식의 왕관')}
          </div>
        </div>
      </div>
    </div>`;
}

// ── Build ──
function renderBuild(c) {
  const s = c.stats;
  return `
    <div class="section">
      <div class="section-header"><span class="section-icon">⚔️</span> 추천 무기</div>
      <div class="section-body">
        <table class="wtable">
          <tr><th>#</th><th>무기명</th><th>등급</th><th>추천 이유</th></tr>
          ${c.weapons.map((w,i) => `<tr>
            <td class="c-rank">${i+1}</td>
            <td class="c-name">${w.name}</td>
            <td>${'★'.repeat(w.stars)}</td>
            <td class="c-note">${w.note}</td>
          </tr>`).join('')}
        </table>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-icon">🛡</span> 추천 성유물</div>
      <div class="section-body">
        <table class="wtable">
          <tr><th>#</th><th>세트명</th><th>추천 이유</th></tr>
          ${c.artifacts.map((a,i) => `<tr>
            <td class="c-rank">${i+1}</td>
            <td class="c-name">${a.name}</td>
            <td class="c-note">${a.note}</td>
          </tr>`).join('')}
        </table>
        <div style="margin-top:18px">
          <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px">성유물 스탯 우선순위</div>
          <div class="stat-grid">
            <div class="stat-row"><div class="stat-key">모래</div><div class="stat-val">${s.sand}</div></div>
            <div class="stat-row"><div class="stat-key">잔</div><div class="stat-val">${s.cup}</div></div>
            <div class="stat-row"><div class="stat-key">왕관</div><div class="stat-val">${s.crown}</div></div>
            <div class="stat-row" style="grid-column:1/-1"><div class="stat-key">부속</div><div class="stat-val">${s.sub}</div></div>
          </div>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-icon">📈</span> 특성 육성 우선순위</div>
      <div class="section-body">
        <div class="priority-list">
          ${c.talentPriority.map((t,i) => `<div class="priority-pill">
            <span class="priority-num">${i+1}</span>
            <span class="priority-text">${t}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
}

// ── Party ──
function renderParty(c) {
  return `
    <div class="section">
      <div class="section-header"><span class="section-icon">👥</span> 파티 구성 추천</div>
      <div class="section-body">
        <div class="party-grid">
          ${c.parties.map(p => `<div class="party-card">
            <div class="party-card-name">${p.name}</div>
            <div class="party-chars">
              ${p.chars.map(ch => `<span class="party-char">${ch}</span>`).join('')}
            </div>
            <div class="party-note">${p.note}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
}

// ── Efficiency ──
function renderEfficiency(c) {
  return `
    <div class="section">
      <div class="section-header"><span class="section-icon">⚡</span> 효율 분석</div>
      <div class="section-body">
        <div class="eff-box">${c.efficiency}</div>
      </div>
    </div>`;
}

// ── Material card ──
function matCard(name) {
  const url = IMG.mat(name);
  const imgHtml = url
    ? `<img src="${url}" alt="${name}" onerror="this.outerHTML='<div class=\\'mat-item-fallback\\'>📦</div>'">`
    : `<div class="mat-item-fallback">📦</div>`;
  return `<div class="mat-item">${imgHtml}<div class="mat-item-name">${name}</div></div>`;
}

// ── Init ──
renderGrid();
</script>
</body>
</html>
