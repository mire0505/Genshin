<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원신 캐릭터 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f0; --surface:#fff; --surface2:#f0eeea;
  --border:#e2dfd8; --border-strong:#c8c4bc;
  --text:#1a1916; --sub:#6b6860; --muted:#a09d98;
  --accent:#b8860b; --accent-bg:#fdf6e3; --accent-bd:#e8d5a0;
  --blue:#3a6ea8; --blue-bg:#eef3fa;
  --green:#3a7a4a; --green-bg:#eef6f0;
  --red:#a03030; --red-bg:#fdf0f0;
  --r:10px; --rs:6px;
  --sh:0 1px 4px rgba(0,0,0,.06),0 2px 12px rgba(0,0,0,.04);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}

/* ─ API modal ─ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:28px;width:400px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal h2{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:6px}
.modal p{font-size:12.5px;color:var(--sub);line-height:1.7;margin-bottom:16px}
.modal p a{color:var(--blue)}
.modal input{width:100%;border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;font-family:inherit;font-size:13px;color:var(--text);outline:none;margin-bottom:10px}
.modal input:focus{border-color:var(--accent-bd)}
.modal-btns{display:flex;gap:8px}
.btn-primary{flex:1;background:var(--accent);border:none;border-radius:var(--rs);color:#fff;font-family:inherit;font-size:13px;font-weight:600;padding:9px;cursor:pointer}
.btn-primary:hover{opacity:.85}
.api-err{color:var(--red);font-size:12px;margin-top:4px;display:none}

/* ─ Layout ─ */
.app{display:flex;height:100vh;overflow:hidden}

/* ─ Sidebar ─ */
.sidebar{width:230px;min-width:230px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 14px 10px;border-bottom:1px solid var(--border)}
.logo{font-size:15px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:6px}
.logo-sub{font-size:11px;color:var(--muted);margin-top:2px}
.api-row{display:flex;align-items:center;gap:5px;margin-top:7px;cursor:pointer}
.kdot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.kdot.on{background:#3a7a4a}
.klabel{font-size:11px;color:var(--muted)}
.sb-filter{padding:9px 10px;border-bottom:1px solid var(--border)}
.sb-filter input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none}
.sb-filter input::placeholder{color:var(--muted)}
.char-list{flex:1;overflow-y:auto;padding:6px 0 12px}
.char-list::-webkit-scrollbar{width:4px}
.char-list::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.grp-lbl{padding:8px 13px 3px;font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.ci{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;position:relative;transition:background .1s}
.ci:hover{background:var(--surface2)}
.ci.active{background:var(--accent-bg);border-left:3px solid var(--accent)}
.ci-thumb{width:34px;height:34px;border-radius:50%;object-fit:cover;object-position:top center;border:1px solid var(--border);flex-shrink:0;background:#eee}
.ci-placeholder{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);flex-shrink:0;font-size:15px}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:12.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci.active .ci-name{color:var(--accent);font-weight:700}
.ci-meta{font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:3px}
.ep{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ─ Main ─ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--border);height:50px;display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0}
.tb-search{display:flex;align-items:center;gap:7px;padding-right:16px;margin-right:16px;border-right:1px solid var(--border)}
.tb-search input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 12px;font-family:inherit;font-size:13px;color:var(--text);width:190px;outline:none;transition:all .15s}
.tb-search input:focus{border-color:var(--accent-bd);background:#fff}
.tb-search input::placeholder{color:var(--muted)}
.go-btn{background:var(--accent);border:none;border-radius:var(--rs);color:#fff;font-family:inherit;font-size:12.5px;font-weight:600;padding:6px 14px;cursor:pointer;white-space:nowrap}
.go-btn:hover{opacity:.85}
.go-btn:disabled{opacity:.4;cursor:not-allowed}
.tabs{display:flex;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--sub);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;padding:0 12px;height:50px;white-space:nowrap;transition:color .15s,border-color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

/* ─ Content ─ */
.content{flex:1;overflow-y:auto;padding:20px 22px 40px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70%;text-align:center;gap:10px}
.empty-icon{font-size:2.8rem;opacity:.35}
.empty-title{font-size:15px;font-weight:600;color:var(--sub)}
.empty-desc{font-size:13px;color:var(--muted);line-height:1.7}

/* Progress */
.prog{display:none;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:16px}
.prog.show{display:flex}
.prog-img{width:72px;height:72px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid var(--accent-bd);animation:pulse-a 1.4s ease-in-out infinite}
@keyframes pulse-a{0%,100%{opacity:.7;transform:scale(.97)}50%{opacity:1;transform:scale(1)}}
.prog-name{font-size:15px;font-weight:700}
.prog-pct{font-size:24px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.prog-bar-outer{width:260px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),#e8b040);border-radius:4px;transition:width .4s ease;width:0}
.prog-step{font-size:12.5px;color:var(--muted);min-height:18px}

/* Result */
.result{display:none;animation:fadeUp .28s ease}
.result.show{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Char header */
.ch-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;box-shadow:var(--sh);display:flex;gap:16px;align-items:flex-start}
.ch-img{width:84px;height:84px;border-radius:12px;object-fit:cover;object-position:top center;border:1px solid var(--border);flex-shrink:0;background:#eee}
.ch-info{flex:1}
.ch-name{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:7px}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.badge{border-radius:4px;font-size:11.5px;font-weight:600;padding:3px 9px}
.b-star{background:#fef8e6;color:#b8860b;border:1px solid #e8d580}
.b-elem{background:var(--blue-bg);color:var(--blue);border:1px solid #c0d8f0}
.b-weap{background:var(--surface2);color:var(--sub);border:1px solid var(--border)}
.b-role{background:var(--green-bg);color:var(--green);border:1px solid #b8dfc0}
.ch-desc{font-size:13px;color:var(--sub);line-height:1.7;border-top:1px solid var(--border);padding-top:9px}

/* Update bar */
.update-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 14px;margin-bottom:14px;font-size:12px;color:var(--muted)}
.update-btn{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--sub);cursor:pointer;font-family:inherit;font-size:11.5px;padding:4px 10px;transition:all .15s}
.update-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Sections */
.sections{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:620px){.sections{grid-template-columns:1fr}}
.section-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.section-card.full{grid-column:1/-1}
.sec-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.sec-title::before{content:'';width:3px;height:13px;background:var(--accent);border-radius:2px;flex-shrink:0}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.tbl th{background:var(--surface2);color:var(--sub);font-weight:600;font-size:11px;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);letter-spacing:.03em}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:var(--surface2)}
.tbl td:first-child{color:var(--blue);font-weight:500}

/* Image grids */
.img-grid{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 6px}
.img-card{display:flex;flex-direction:column;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;min-width:72px;max-width:96px}
.img-card img{width:52px;height:52px;object-fit:contain;border-radius:4px}
.img-card-lbl{font-size:10.5px;color:var(--sub);text-align:center;word-break:keep-all;line-height:1.3}

/* Stat rows */
.stat-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;font-size:13px}
.stat-key{color:var(--muted);font-size:12px;min-width:70px;flex-shrink:0;padding-top:1px}
.stat-val{color:var(--text);flex:1;line-height:1.6}

/* Party cards */
.party-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.party-name{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px}
.party-chars{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.party-char{font-size:12.5px;font-weight:500;color:var(--blue);background:var(--blue-bg);border:1px solid #c0d8f0;border-radius:4px;padding:2px 8px}
.party-note{font-size:12px;color:var(--sub)}

/* Priority pills */
.priority{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.prio-pill{background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:20px;font-size:12px;font-weight:600;color:var(--accent);padding:3px 10px;display:flex;align-items:center;gap:4px}
.prio-num{background:var(--accent);color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Efficiency */
.eff-box{background:var(--green-bg);border:1px solid #b8dfc0;border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text);line-height:1.7}

/* Error */
.err-box{background:var(--red-bg);border:1px solid #f0c0c0;border-radius:var(--r);color:var(--red);font-size:13px;padding:14px 18px;display:none}
.err-box.show{display:block}

/* Spinner (update) */
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:660px){.sidebar{display:none}.tb-search input{width:130px}}
</style>
</head>
<body>

<!-- API Modal -->
<div class="overlay" id="apiOverlay">
  <div class="modal">
    <h2>⚔️ 원신 캐릭터 가이드</h2>
    <p>
      외부 실행 시 <strong>Anthropic API 키</strong>가 필요해요.<br>
      <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>에서 발급 가능.<br>
      키는 이 브라우저에만 저장되며 서버로 전송되지 않아요.<br><br>
      기본 데이터는 하드코딩되어 있어 토큰 절약. 업데이트 버튼 눌렀을 때만 AI가 검색해요.
    </p>
    <input type="password" id="apiInput" placeholder="sk-ant-api...">
    <div class="api-err" id="apiErr">유효하지 않은 API 키 형식이에요.</div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="saveKey()">저장하고 시작</button>
    </div>
  </div>
</div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-head">
      <div class="logo">⚔️ 원신 가이드</div>
      <div class="logo-sub">캐릭터 도감 · 공략</div>
      <div class="api-row" onclick="resetKey()">
        <span class="kdot" id="kdot"></span>
        <span class="klabel" id="klabel">API 키 없음</span>
      </div>
    </div>
    <div class="sb-filter">
      <input type="text" id="filterIn" placeholder="캐릭터 필터..." oninput="filterList(this.value)">
    </div>
    <div class="char-list" id="charList"></div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="tb-search">
        <input type="text" id="mainIn" placeholder="캐릭터 직접 입력...">
        <button class="go-btn" id="goBtn" onclick="doSearch()">검색</button>
      </div>
      <div class="tabs" id="tabs">
        <button class="tab active" data-cat="all">전체</button>
        <button class="tab" data-cat="ascension">돌파 재료</button>
        <button class="tab" data-cat="talent">특성 재료</button>
        <button class="tab" data-cat="build">세팅 가이드</button>
        <button class="tab" data-cat="party">파티 구성</button>
        <button class="tab" data-cat="efficiency">효율 분석</button>
      </div>
    </div>

    <div class="content" id="contentArea">
      <div class="empty" id="emptyState">
        <div class="empty-icon">⚔️</div>
        <div class="empty-title">캐릭터를 선택하거나 검색하세요</div>
        <div class="empty-desc">왼쪽 목록 클릭 또는 위 검색창 입력</div>
      </div>

      <div class="prog" id="progWrap">
        <img class="prog-img" id="progImg" src="" alt="">
        <div class="prog-name" id="progName"></div>
        <div class="prog-pct" id="progPct">0%</div>
        <div class="prog-bar-outer"><div class="prog-bar" id="progBar"></div></div>
        <div class="prog-step" id="progStep">준비 중...</div>
      </div>

      <div class="err-box" id="errBox"></div>
      <div class="result" id="resultArea"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  데이터
// ══════════════════════════════════════════════════

let curChar = '';

let progTimer = null;

function getKey() { return localStorage.getItem('genshin_apikey')||''; }
function saveKey() {
  const v = document.getElementById('apiInput').value.trim();
  if (!v.startsWith('sk-ant')) { document.getElementById('apiErr').style.display='block'; return; }
  localStorage.setItem('genshin_apikey', v);
  document.getElementById('apiOverlay').style.display='none';
  updateKeyUI();
}
function resetKey() {
  if (!confirm('API 키를 초기화하시겠어요?')) return;
  localStorage.removeItem('genshin_apikey');
  document.getElementById('apiOverlay').style.display='flex';
  updateKeyUI();
}
function updateKeyUI() {
  const has = !!getKey();
  document.getElementById('kdot').className = 'kdot'+(has?' on':'');
  document.getElementById('klabel').textContent = has?'API 키 설정됨 (클릭 변경)':'API 키 없음';
}

// Wiki image URL
function wikiImg(name) {
  return `${WIKI}${encodeURIComponent(name)}.png`;
}
function matImg(name) {
  const f = MAT_IMG[name];
  return f ? wikiImg(f) : null;
}
function weapImg(name) {
  const f = WEAPON_IMG[name];
  return f ? wikiImg(f) : null;
}
function artImg(name) {
  const f = ARTIFACT_IMG[name];
  return f ? wikiImg(f) : null;
}
function charImg(d) {
  return d?.img ? wikiImg(d.img) : null;
}

// Image card HTML
function imgCard(name, url, fallback) {
  if (!url) return '';
  return `<div class="img-card">
    <img src="${url}" alt="${name}" onerror="this.closest('.img-card').style.display='none'">
    <div class="img-card-lbl">${name}</div>
  </div>`;
}

// Image grid HTML
function imgGrid(items, fn) {
  const cards = items.map(n => imgCard(n, fn(n))).filter(Boolean).join('');
  return cards ? `<div class="img-grid">${cards}</div>` : '';
}

// ── Sidebar ──
function buildList(filter='') {
  const lf = filter.toLowerCase();
  const filtered = CHAR_LIST.filter(c => !lf || c.name.includes(lf));
  const f5 = filtered.filter(c=>c.star===5);
  const f4 = filtered.filter(c=>c.star===4);
  let h = '';
  if (f5.length) { h += '<div class="grp-lbl">5성</div>'; f5.forEach(c=>h+=ciHTML(c)); }
  if (f4.length) { h += '<div class="grp-lbl">4성</div>'; f4.forEach(c=>h+=ciHTML(c)); }
  if (!filtered.length) h = '<div style="padding:16px 13px;color:var(--muted);font-size:12.5px">결과 없음</div>';
  document.getElementById('charList').innerHTML = h;
  document.querySelectorAll('.ci').forEach(el => {
    if (el.dataset.name===curChar) el.classList.add('active');
    el.addEventListener('click', () => {
      document.getElementById('mainIn').value = el.dataset.name;
      doSearch(el.dataset.name);
    });
  });
}

function ciHTML(c) {
  const d = CHAR_DATA[c.name];
  const img = d ? charImg(d) : null;
  const thumb = img
    ? `<img class="ci-thumb" src="${img}" alt="${c.name}" onerror="this.style.display='none'">`
    : `<div class="ci-placeholder" style="background:${ELEM[c.elem].color}22">${ELEM[c.elem].icon}</div>`;
  return `<div class="ci" data-name="${c.name}">
    ${thumb}
    <div class="ci-info">
      <div class="ci-name">${c.name}</div>
      <div class="ci-meta"><span class="ep" style="background:${ELEM[c.elem].color}"></span>${ELEM[c.elem].label} · ★${c.star}</div>
    </div>
  </div>`;
}

// ── Tabs ──
document.addEventListener('DOMContentLoaded', ()=>{
  if (getKey()) document.getElementById('apiOverlay').style.display='none';
  updateKeyUI();
  buildList();

  document.getElementById('tabs').querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
      t.classList.add('active');
      curCat = t.dataset.cat;
      if (curChar) render(curChar);
    });
  });
  document.getElementById('mainIn').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
  document.getElementById('apiInput').addEventListener('keydown', e=>{ if(e.key==='Enter') saveKey(); });
});

// ── Search (instant from data) ──
function doSearch(override) {
  const name = override || document.getElementById('mainIn').value.trim();
  if (!name) { document.getElementById('mainIn').focus(); return; }
  curChar = name;
  document.getElementById('mainIn').value = name;
  buildList(document.getElementById('filterIn').value);

  const d = CHAR_DATA[name];
  if (d) {
    showResult(name, d);
  } else {
    // Not in DB: offer AI search
    document.getElementById('emptyState').style.display='none';
    document.getElementById('resultArea').className='result';
    document.getElementById('errBox').className='err-box';
    document.getElementById('resultArea').className='result show';
    document.getElementById('resultArea').innerHTML = `
      <div style="background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--sh);text-align:center">
        <div style="font-size:2rem;margin-bottom:12px">🔍</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:8px">"${name}" 데이터 없음</div>
        <div style="font-size:13px;color:var(--sub);margin-bottom:18px">이 캐릭터는 아직 하드코딩 데이터가 없어요.<br>AI 검색으로 정보를 가져올 수 있어요.</div>
        <button onclick="aiSearch('${name}')" style="background:var(--accent);border:none;border-radius:var(--rs);color:#fff;font-family:inherit;font-size:13px;font-weight:600;padding:9px 22px;cursor:pointer">🤖 AI로 검색하기</button>
      </div>`;
  }
}

// ── Render from hardcoded data ──
function render(name) {
  const d = CHAR_DATA[name];
  if (d) showResult(name, d);
}

function showResult(name, d) {
  document.getElementById('emptyState').style.display='none';
  document.getElementById('progWrap').className='prog';
  document.getElementById('errBox').className='err-box';

  // Get cached update time
  const cacheKey = `genshin_updated_${name}`;
  const updatedAt = localStorage.getItem(cacheKey) || '기본 데이터 (하드코딩)';
  const isAiData = updatedAt.includes('20');

  const el = ELEM[d.elem]||{label:'',color:'#aaa',icon:'⚔'};
  const imgUrl = charImg(d);

  let html = '';

  // Header
  html += `<div class="ch-card">
    ${imgUrl ? `<img class="ch-img" src="${imgUrl}" alt="${name}" onerror="this.style.display='none'">` : `<div class="ch-img" style="background:${el.color}22;display:flex;align-items:center;justify-content:center;font-size:2.5rem">${el.icon}</div>`}
    <div class="ch-info">
      <div class="ch-name">${name}</div>
      <div class="badges">
        <span class="badge b-star">★${d.star}성</span>
        <span class="badge b-elem">${el.icon} ${el.label}</span>
        <span class="badge b-weap">${d.weapon}</span>
        <span class="badge b-role">${d.role}</span>
      </div>
      ${d.desc ? `<div class="ch-desc">${d.desc}</div>` : ''}
    </div>
  </div>`;

  // Update bar
  html += `<div class="update-bar">
    <span>📅 ${isAiData ? 'AI 업데이트: '+updatedAt : updatedAt}</span>
    <button class="update-btn" onclick="aiUpdate('${name}')">🔄 최신 정보로 업데이트</button>
  </div>`;

  // ── Sections by category ──
  const cat = curCat;

  if (cat==='all'||cat==='ascension') html += ascensionSection(name, d);
  if (cat==='all'||cat==='talent')    html += talentSection(name, d);
  if (cat==='all'||cat==='build')     html += buildSection(name, d);
  if (cat==='all'||cat==='party')     html += partySection(name, d);
  if (cat==='all'||cat==='efficiency') html += efficiencySection(name, d);

  const ra = document.getElementById('resultArea');
  ra.innerHTML = html;
  ra.className = 'result show';
}

const PROG_STEPS = [
  {p:8,m:'웹 검색 시작...'},
  {p:20,m:'캐릭터 기본 정보 검색 중...'},
  {p:38,m:'돌파·특성 재료 수집 중...'},
  {p:55,m:'세팅 가이드 분석 중...'},
  {p:70,m:'파티 구성 검색 중...'},
  {p:82,m:'효율 데이터 정리 중...'},
  {p:92,m:'마무리 중...'},
];

function startProgress(name) {
  const d = CHAR_DATA[name];
  const imgUrl = d ? charImg(d) : null;
  const pw = document.getElementById('progWrap');
  const pi = document.getElementById('progImg');
  if (imgUrl) { pi.src=imgUrl; pi.style.display=''; } else pi.style.display='none';
  document.getElementById('progName').textContent = name;
  document.getElementById('progPct').textContent='0%';
  document.getElementById('progBar').style.width='0%';
  document.getElementById('progStep').textContent='준비 중...';
  pw.className='prog show';
  document.getElementById('resultArea').className='result';

  let si=0;
  function adv() {
    if(si>=PROG_STEPS.length) return;
    const s=PROG_STEPS[si++];
    document.getElementById('progPct').textContent=s.p+'%';
    document.getElementById('progBar').style.width=s.p+'%';
    document.getElementById('progStep').textContent=s.m;
    progTimer=setTimeout(adv, 700+Math.random()*1200);
  }
  adv();
}

function stopProgress() {
  clearTimeout(progTimer);
  document.getElementById('progPct').textContent='100%';
  document.getElementById('progBar').style.width='100%';
  document.getElementById('progStep').textContent='완료!';
  setTimeout(()=>{ document.getElementById('progWrap').className='prog'; }, 500);
}

async function aiUpdate(name) {
  const key = getKey();
  if (!key) { document.getElementById('apiOverlay').style.display='flex'; return; }
  startProgress(name);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        system:'원신(Genshin Impact) 전문 공략 가이드. 웹 검색으로 최신 버전 기준 정확한 정보를 한국어로 간결하게 정리. 모든 이름은 공식 한국어 번역으로. 마크다운 사용(## 제목, 표).',
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`원신 캐릭터 "${name}"의 최신 정보를 웹 검색해서 알려줘. 최신 버전 기준.

## 기본 정보
성급·원소·무기·역할

## 돌파 재료
| 재료명 | 수급처 | Lv~60 | Lv~70 | Lv~80 | Lv~90 |

## 특성 재료  
| 재료명 | 수급처 | Lv~6 | Lv~8 | Lv~10 |
비경 이름·요일, 주간보스 재료

## 추천 무기
| 순위 | 무기명 | 등급 | 이유 |

## 추천 성유물
| 순위 | 세트명 | 이유 |
성유물 스탯 (모래/잔/왕관/부속)

## 파티 구성
고과금/범용/저과금 조합 각 4명

## 효율 분석
돌파 효율, 메타 포지션, 총평`}]
      })
    });

    if(!res.ok) throw new Error(`API 오류 ${res.status}`);
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    if(!text.trim()) throw new Error('결과 없음');

    stopProgress();

    // Save update time
    const now = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
    localStorage.setItem(`genshin_updated_${name}`, now);

    // Show AI result below hardcoded data
    if (CHAR_DATA[name]) showResult(name, CHAR_DATA[name]);

    // Append AI section
    const ra = document.getElementById('resultArea');
    ra.innerHTML += `<div class="sections"><div class="section-card full">
      <div class="sec-title">🤖 AI 최신 정보 (${now})</div>
      <div style="font-size:13.5px;line-height:1.85;white-space:pre-wrap;color:var(--text)">${text.replace(/</g,'&lt;')}</div>
    </div></div>`;

  } catch(e) {
    stopProgress();
    document.getElementById('errBox').textContent='업데이트 오류: '+e.message;
    document.getElementById('errBox').className='err-box show';
  }
}

async function aiSearch(name) {
  const key = getKey();
  if(!key){ document.getElementById('apiOverlay').style.display='flex'; return; }
  startProgress(name);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:2500,
        system:'원신 공략 가이드. 웹 검색으로 최신 정보 한국어로 정리. 서론 없이 바로 핵심 정보부터.',
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`원신 캐릭터 "${name}" 전체 정보 검색해줘. 한국 공식 번역 이름으로.

## 기본 정보 / ## 돌파 재료 표 / ## 특성 재료 표 / ## 추천 무기 표 / ## 추천 성유물 표 / ## 성유물 스탯 / ## 파티 구성 / ## 효율 분석`}]
      })
    });
    if(!res.ok) throw new Error(`오류 ${res.status}`);
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    stopProgress();
    const now = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});
    localStorage.setItem(`genshin_updated_${name}`, now);
    const ra = document.getElementById('resultArea');
    ra.className='result show';
    ra.innerHTML=`
      <div class="ch-card" style="margin-bottom:14px">
        <div style="font-size:20px;font-weight:700">${name}</div>
      </div>
      <div class="update-bar">
        <span>📅 AI 검색: ${now}</span>
        <button class="update-btn" onclick="aiSearch('${name}')">🔄 다시 검색</button>
      </div>
      <div class="sections"><div class="section-card full">
        <div class="sec-title">🤖 AI 검색 결과</div>
        <div style="font-size:13.5px;line-height:1.85;white-space:pre-wrap">${text.replace(/</g,'&lt;')}</div>
      </div></div>`;
  } catch(e) {
    stopProgress();
    document.getElementById('errBox').textContent='검색 오류: '+e.message;
    document.getElementById('errBox').className='err-box show';
  }
}

function filterList(v){ buildList(v); }
